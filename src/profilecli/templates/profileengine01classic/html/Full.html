<!DOCTYPE html>
<html lang="{{ locale.language_iso_639_1 }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>
        {{ title }}
    </title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css"
        integrity="sha512-Pmhg2i/F7+5+7SsdoUqKeH7UAZoVMYb1sxGOoJ0jWXAEHP0XV2H4CITyK267eHWp2jpj7rtqWNkmEOw1tNyYpg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.12/dist/katex.min.css" integrity="sha384-PDbUeNCuE6bOPudPOgFyIUEy3UJawJVwr3XlGO90FIuf5qNIoTLSgOJo/dC2ZXV/" crossorigin="anonymous">

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.12/dist/katex.min.js" integrity="sha384-VkqWq8xtm5YQk1BBXczQ8/Sx+DlCzF8cuS43bZwmtVXzRFtyLTqTCdP7MKmKo+KN" crossorigin="anonymous"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.12/dist/contrib/auto-render.min.js" integrity="sha384-hCXGrW6PitJEwbkoStFjeJxv+fSOOQKOPbJxSfM6G5sWZjAyWhXiTIIAmQqnlLlh" crossorigin="anonymous"
        onload="renderMathInElement(document.body, {delimiters: [{ left: '$$',  right: '$$',  display: false }]});"></script>
    <style>
        :root {
            --color-name: {{ design.colors.name.as_rgb() }};
            --color-headline: {{ design.colors.headline.as_rgb() }};
            --color-connections: {{ design.colors.connections.as_rgb() }};
            --color-section-titles: {{ design.colors.section_titles.as_rgb() }};
            --color-links: {{ design.colors.links.as_rgb() }};
        }

        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
            line-height: 1.45;
        }

        .markdown-body a {
            color: var(--color-links);
        }

        .markdown-body h1:first-of-type {
            color: var(--color-name);
        }

        .markdown-body h1:first-of-type + h2 {
            color: var(--color-headline);
            font-size: 1.5rem;
            margin-top: -0.5rem;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .markdown-body>ul:first-of-type {
            color: var(--color-connections);
            list-style: none;
            padding-left: 0;
            margin-top: 0;
            margin-bottom: 1.2rem;
        }

        .markdown-body h1:not(:first-of-type) {
            color: var(--color-section-titles);
            font-size: 1.6rem;
        }

        .markdown-body h2 {
            font-size: 1.06rem;
            font-weight: 600;
            margin-top: 1.05rem;
            margin-bottom: 0.35rem;
        }

        .markdown-body ul li {
            line-height: 1.5;
            margin-bottom: 0.22rem;
        }

        .markdown-body h2 + p {
            margin-top: 0.15rem;
        }

        .markdown-body ul + h2 {
            margin-top: 1.35rem;
        }

        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }
    </style>
</head>

<body>
    <article class="markdown-body">
        {{ html_body|indent(8) }}
    </article>
</body>

</html>
