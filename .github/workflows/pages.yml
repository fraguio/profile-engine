name: Publish CV to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      profile_data_ref:
        description: "Branch, tag, or commit SHA to checkout from profile-data"
        required: true
        default: "main"
      profile_data_path:
        description: "Path to resume JSON inside profile-data"
        required: true
        default: "data/resume.json"
  repository_dispatch:
    types: [profile-data-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROFILE_DATA_REF: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.profile_data_ref || inputs.profile_data_ref || 'main' }}
      PROFILE_DATA_PATH: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.profile_data_path || inputs.profile_data_path || 'data/resume.json' }}
    steps:
      - name: Checkout profile-engine
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install profilectl and RenderCV
        run: pip install . "rendercv[full]>=2.8,<2.9"

      - name: Checkout profile-data
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/profile-data
          ref: ${{ env.PROFILE_DATA_REF }}
          path: external/profile-data
          token: ${{ secrets.PROFILE_DATA_REPO_TOKEN }}

      - name: Generate RenderCV YAML and HTML
        run: >-
          profilectl html
          --input external/profile-data/${{ env.PROFILE_DATA_PATH }}
          --output output/rendercv_CV.yaml
          --html-output output/index.html

      - name: Verify output exists
        run: |
          test -f output/index.html

      - name: List output
        run: ls -R output

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
